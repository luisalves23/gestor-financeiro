<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <h1 class="page-title">Visão Geral</h1>
        </header>
        
        <main id="app-content">
            <section class="overview-card">
                <div class="label">Saldo atual hoje</div>
                <div class="balance" id="current-balance">R$ 126,74</div>
                <div class="target" id="daily-target">Meta: R$ 240,00</div>
                <div class="btn-group">
                    <button class="btn-add" id="btn-add-revenue">Adicionar</button>
                    <button class="btn-minus" id="btn-add-expense">-</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
